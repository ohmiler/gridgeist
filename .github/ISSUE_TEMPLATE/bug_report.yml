name: 'Bug report'
description: 'Report an installation, workflow, or output problem.'
title: '[Bug]: '
labels: []
body:
  - type: markdown
    attributes:
      value: 'Thanks for helping improve Gridgeist. Please include enough context for someone else to reproduce the problem.'
  - type: input
    id: summary
    attributes:
      label: 'Problem summary'
      description: 'What went wrong?'
      placeholder: 'Example: The review step stops before producing recommendations.'
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 'Area'
      options:
        - 'Installation'
        - 'Create workflow'
        - 'Redesign workflow'
        - 'Review workflow'
        - 'Documentation or website'
        - 'Other'
    validations:
      required: true
  - type: input
    id: agent
    attributes:
      label: 'Agent and environment'
      description: 'Name the coding agent, operating system, and relevant version if known.'
      placeholder: 'Example: Codex on Windows 11'
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 'Steps to reproduce'
      description: 'Include the prompt or command when possible. Remove secrets and private data.'
      placeholder: |
        1. Install Gridgeist using ...
        2. Ask the agent to ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 'Expected and actual behavior'
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 'Screenshots or logs'
      description: 'Drag in screenshots or paste concise logs. Remove secrets and private data.'
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: 'Before submitting'
      options:
        - label: 'I checked that an existing issue does not already describe this problem.'
          required: true
        - label: 'I removed secrets and private information from this report.'
          required: true
